<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resonate — Open Loudspeaker Enclosure Simulator</title>
<style>
  :root{
    --bg:#11151c; --panel:#1a2029; --panel2:#222a35; --line:#2e3a48;
    --fg:#dfe6ee; --mut:#8a99ab; --acc:#4fb0ff; --acc2:#ffb454; --good:#5ad17a; --bad:#ff6b6b;
  }
  *{box-sizing:border-box}
  body{margin:0;font:13px/1.45 "Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--fg)}
  h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.3px}
  h1 small{color:var(--mut);font-weight:400;font-size:11px}
  header{display:flex;align-items:center;gap:14px;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--line)}
  header .sp{flex:1}
  .layout{display:flex;height:calc(100vh - 41px)}
  .side{width:330px;min-width:330px;overflow-y:auto;background:var(--panel);border-right:1px solid var(--line);padding:10px}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  canvas{display:block;width:100%;height:100%}
  /* graph toolbar */
  .gtoolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:6px 10px;background:var(--panel);border-bottom:1px solid var(--line)}
  .gchip{padding:3px 9px;border:1px solid var(--line);border-radius:12px;font-size:11px;color:var(--mut);cursor:pointer;user-select:none}
  .gchip.on{background:var(--acc);color:#06223a;border-color:var(--acc);font-weight:600}
  .gtoolbar .sep{width:1px;align-self:stretch;background:var(--line);margin:0 4px}
  .gtoolbar .lab{font-size:11px;color:var(--mut)}
  /* graph grid */
  .ggrid{flex:1;display:grid;gap:8px;padding:8px 10px;overflow:auto;grid-auto-rows:minmax(160px,1fr)}
  .gpanel{position:relative;border:1px solid var(--line);border-radius:6px;background:#0e1218;overflow:hidden;min-height:160px}
  .gpanel canvas{position:absolute;inset:0}
  .gpanel .gtitle{position:absolute;left:8px;top:5px;font-size:11px;color:var(--mut);pointer-events:none;z-index:2}
  .gpanel .gread{position:absolute;right:6px;top:5px;font-size:10.5px;background:rgba(10,14,20,.82);border:1px solid var(--line);border-radius:4px;padding:3px 6px;z-index:2;pointer-events:none;display:none;max-width:60%}
  .gpanel .gread b{color:var(--fg)}
  /* collapsed driver summary */
  .drvsum{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--panel2);border-radius:5px;cursor:pointer}
  .drvsum .nm{flex:1;font-weight:600;color:var(--fg);font-size:12px}
  .drvsum .ed{font-size:10px;color:var(--acc);border:1px solid var(--line);border-radius:4px;padding:2px 7px}
  .drvsum:hover .ed{border-color:var(--acc)}
  .drvspecs{font-size:10.5px;color:var(--mut);padding:4px 8px 2px;line-height:1.5}
  .drvspecs b{color:var(--acc2)}
  .flash{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--acc);color:#06223a;font-weight:600;padding:8px 16px;border-radius:6px;font-size:12px;z-index:80;transition:opacity .4s;pointer-events:none}
  fieldset{border:1px solid var(--line);border-radius:6px;margin:0 0 10px;padding:8px 10px}
  legend{color:var(--acc);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:0 4px}
  .row{display:flex;align-items:center;gap:6px;margin:3px 0}
  .row label{flex:1;color:var(--mut)}
  .row input,.row select{width:96px;background:var(--panel2);border:1px solid var(--line);color:var(--fg);border-radius:4px;padding:3px 5px;font:inherit;text-align:right}
  .row select{text-align:left;width:auto;flex:1}
  .row .u{width:34px;color:var(--mut);font-size:11px;text-align:left}
  button{background:var(--panel2);border:1px solid var(--line);color:var(--fg);border-radius:5px;padding:5px 10px;cursor:pointer;font:inherit}
  button:hover{border-color:var(--acc)}
  button.pri{background:var(--acc);color:#06223a;border-color:var(--acc);font-weight:600}
  .btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .ebp{margin-top:6px;padding:6px;background:var(--panel2);border-radius:5px;font-size:11px}
  .ebp b{color:var(--acc2)}
  .stat{display:flex;flex-wrap:wrap;gap:4px 14px;padding:6px 14px;background:var(--panel);border-top:1px solid var(--line);font-size:11px;color:var(--mut)}
  .stat b{color:var(--fg)}
  .hint{color:var(--mut);font-size:10.5px;margin:2px 0 6px}
  .tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;background:var(--panel2);color:var(--acc2)}
  a{color:var(--acc)}
  details summary{cursor:pointer;color:var(--mut)}
  /* modal / driver browser */
  .overlay{position:fixed;inset:0;background:rgba(4,8,14,.66);display:none;align-items:center;justify-content:center;z-index:50}
  .overlay.on{display:flex}
  .modal{width:min(720px,92vw);max-height:86vh;display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .modal h2{margin:0;font-size:14px;padding:11px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .modal h2 .x{margin-left:auto;cursor:pointer;color:var(--mut);font-size:18px;line-height:1}
  .modal .body{padding:12px 14px;overflow-y:auto}
  .srcrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  .srcrow select,.srcrow input{background:var(--panel2);border:1px solid var(--line);color:var(--fg);border-radius:5px;padding:5px 7px;font:inherit}
  .srcrow input{flex:1;min-width:160px}
  .srcmeta{font-size:11px;color:var(--mut);margin:2px 0 10px}
  .srcmeta a{color:var(--acc)}
  .filter{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--fg);border-radius:5px;padding:6px 8px;font:inherit;margin-bottom:8px}
  .dlist{border:1px solid var(--line);border-radius:6px;max-height:42vh;overflow-y:auto}
  .ditem{padding:6px 10px;cursor:pointer;border-bottom:1px solid var(--line);font-size:12px}
  .ditem:last-child{border-bottom:none}
  .ditem:hover{background:var(--panel2)}
  .ditem b{color:var(--acc2)}
  .status{font-size:12px;color:var(--mut);padding:8px 2px}
  .status.err{color:var(--bad)}
</style>
</head>
<body>
<header>
  <h1>Resonate<span style="color:var(--acc)"> ~</span> &nbsp;<small>open loudspeaker enclosure simulator &middot; community-owned &middot; runs anywhere</small></h1>
  <div class="sp"></div>
  <button id="btnBrowse" class="pri">Browse drivers</button>
  <button id="btnImport">Import .wdr / project</button>
  <button id="btnExportWdr">Export driver .wdr</button>
  <button id="btnShare">Share link</button>
  <button id="btnExport">Export design</button>
  <input type="file" id="fileImport" accept=".wdr,.json" style="display:none">
  <button id="btnAbout">About</button>
</header>

<div class="layout">
  <div class="side" id="side"></div>
  <div class="main">
    <div class="gtoolbar" id="gtoolbar"></div>
    <div class="ggrid" id="ggrid"></div>
    <div class="stat" id="stat"></div>
  </div>
</div>

<div class="overlay" id="browseOverlay">
  <div class="modal">
    <h2>Browse driver library <span class="x" id="browseClose">&times;</span></h2>
    <div class="body">
      <div class="srcrow">
        <select id="srcSelect"></select>
        <input id="srcCustom" placeholder="…or paste a GitHub repo: owner/repo or full URL">
        <button id="srcLoad">Load</button>
      </div>
      <div class="srcmeta" id="srcMeta"></div>
      <input class="filter" id="srcFilter" placeholder="Filter drivers…">
      <div class="dlist" id="dList"></div>
      <div class="status" id="srcStatus"></div>
    </div>
  </div>
</div>

<script type="module">
import { RHO, C, P0,
         cx, cAdd, cSub, cMul, cDiv, cInv, cAbs, cArg, cScale, cPar,
         deriveDriver, parseWdr, toWdr,
         solve, portLoss,
         sweep, unwrap, maxCurves,
         ebp, sealedFromQtc, ventedAlignment, ventLength, tuningFromLength,
         prTuning, prMassForFp } from './src/core/index.js';
/* =========================================================================
   PRESET DRIVERS  (representative real-world T/S; sources noted)
   ========================================================================= */
const PRESETS = {
  "Dayton DCS205-4 8\" sub":      {Fs:28.8,Qts:0.40,Qes:0.43,Qms:5.9,Vas:0.0305,Sd:0.0210,Re:3.3,Le:0.78e-3,Xmax:0.0090,Pe:120,Z:4},
  "Tang Band W5-1138SMF 5\"":     {Fs:43,  Qts:0.42,Qes:0.46,Qms:5.2,Vas:0.0067,Sd:0.0087,Re:3.5,Le:0.52e-3,Xmax:0.0090,Pe:40, Z:4},
  "SB Acoustics SB15SFCR-00 5\"": {Fs:42,  Qts:0.34,Qes:0.36,Qms:6.6,Vas:0.0082,Sd:0.0094,Re:5.9,Le:0.05e-3,Xmax:0.0050,Pe:50, Z:8},
  "Dayton RS180-8 7\"":           {Fs:37,  Qts:0.45,Qes:0.50,Qms:4.9,Vas:0.0210,Sd:0.0133,Re:6.0,Le:0.50e-3,Xmax:0.0055,Pe:60, Z:8},
  "Generic 6.5\" woofer":         {Fs:37,  Qts:0.38,Qes:0.40,Qms:7.0,Vas:0.0300,Sd:0.0133,Re:5.6,Le:0.70e-3,Xmax:0.0050,Pe:60, Z:8},
  "Generic 12\" sub":             {Fs:24,  Qts:0.40,Qes:0.42,Qms:6.0,Vas:0.0900,Sd:0.0490,Re:3.4,Le:1.10e-3,Xmax:0.0130,Pe:300,Z:4},
};

/* =========================================================================
   STATE
   ========================================================================= */
const state = {
  driverRaw: Object.assign({name:"Generic 6.5\" woofer"}, PRESETS["Generic 6.5\" woofer"]),
  driver: null,
  box: 'vented',
  P: { Vb:0.030, Vf:0.015, Sp:Math.PI*0.025*0.025, Leff:0.10, Ql:7, Qp:100,
       fb:35, ventD:0.05, ventL:0.10, nDrivers:1, wiring:'parallel', Pin:1, eg:2.83,
       prSd:0.0133, prMmp:0.030, prCms:0.0008, prRms:1.0, prXmax:0.012,
       fmin:10, fmax:1000, N:400 },
  graphs: ['SPL','Excursion','Zmag','GD'],   // graphs shown simultaneously
  compare: [],                                // pinned design snapshots to overlay
  editDriver: false,                          // is the driver panel expanded for editing?
  cursorF: null,                              // synced hover frequency across graphs
};
function recompute(){ state.driver = deriveDriver(state.driverRaw); }

/* =========================================================================
   PLOT TABS
   ========================================================================= */
const TABS = [
  {id:'SPL',   name:'SPL response',     unit:'dB',   color:'#4fb0ff'},
  {id:'Excursion', name:'Cone excursion', unit:'mm', color:'#ffb454'},
  {id:'Port',  name:'Air velocity',     unit:'m/s',  color:'#5ad17a'},
  {id:'GD',    name:'Group delay',      unit:'ms',   color:'#c08bff'},
  {id:'Zmag',  name:'Impedance',        unit:'Ω',    color:'#ff6b6b'},
  {id:'Zph',   name:'Impedance phase',  unit:'°',    color:'#ff9bb0'},
  {id:'Phase', name:'Transfer phase',   unit:'°',    color:'#7fd4ff'},
  {id:'MaxSPL',name:'Maximum SPL',      unit:'dB',   color:'#5ad17a'},
  {id:'MaxPwr',name:'Maximum power',    unit:'W',    color:'#ffd05a'},
];

/* =========================================================================
   CANVAS PLOTTER  (log-x frequency, linear-y, multi-series, hover crosshair)
   ========================================================================= */
const side=document.getElementById('side');
const ggrid=document.getElementById('ggrid'), gtoolbar=document.getElementById('gtoolbar');
let GR=[];                       // [{id,panel,canvas,ctx,title,read,plotData}]
const DPAL=['#4fb0ff','#ffb454','#5ad17a','#ff6b6b','#c08bff'];  // design colours when comparing
// per-design curve cache (so each design is swept once, not once per graph)
function driveVoltage(P,drv){ return Math.sqrt((P.Pin!=null?P.Pin:1)*(drv.Z||drv.Re||8)); } // W -> V into nominal Z
function syncP(d){
  if(d.box==='vented'||d.box==='bandpass4'){ d.P.Sp=Math.PI*(d.P.ventD/2)**2; d.P.Leff=d.P.ventL+0.85*d.P.ventD; }
  if(d.P.Pin!=null) d.P.eg=driveVoltage(d.P,d.driver);   // power is the primary input (WinISD convention); derive voltage
  return d;
}
function designCurves(d){ if(!d._sw){ syncP(d); d._sw=sweep(d.driver,d.box,d.P); } return d._sw; }
function designMax(d){ if(!d._mc){ syncP(d); d._mc=maxCurves(d.driver,d.box,d.P); } return d._mc; }
function fmtF(f){ return f>=1000? (f/1000).toFixed(f<10000?2:1)+'k' : (f>=100?f.toFixed(0):f.toFixed(0)); }
function niceTicks(min,max,n=6){
  const span=max-min, step0=span/n, mag=Math.pow(10,Math.floor(Math.log10(step0)));
  const norm=step0/mag, step= norm<1.5?1:norm<3?2:norm<7?5:10, s=step*mag;
  const t=[]; for(let v=Math.ceil(min/s)*s; v<=max+1e-9; v+=s) t.push(+v.toFixed(6));
  return t;
}
function drawOne(G){
  const cv=G.canvas, ctx=G.ctx, plotData=G.plotData;
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth||cv.width||300, Hh=cv.clientHeight||cv.height||180;
  cv.width=W*dpr; cv.height=Hh*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,Hh);
  if(!plotData) return;
  const m={l:44,r:10,t:18,b:20};
  const pw=W-m.l-m.r, ph=Hh-m.t-m.b;
  const f0=state.P.fmin, f1=state.P.fmax;
  const lx0=Math.log10(f0), lx1=Math.log10(f1);
  const {ymin,ymax,logy}=plotData;
  const ly0= logy?Math.log10(ymin):ymin, ly1= logy?Math.log10(ymax):ymax;
  const X=f=> m.l + (Math.log10(f)-lx0)/(lx1-lx0)*pw;
  const Y=v=>{ const vv=logy?Math.log10(v):v; return m.t + (1-(vv-ly0)/(ly1-ly0))*ph; };
  ctx.strokeStyle='#243040'; ctx.fillStyle='#7c8a9c'; ctx.font='9px Segoe UI'; ctx.lineWidth=1;
  for(let dec=Math.floor(lx0); dec<=Math.ceil(lx1); dec++) for(const mul of [1,2,3,4,5,6,7,8,9]){
    const f=mul*Math.pow(10,dec); if(f<f0||f>f1) continue;
    const x=X(f); ctx.globalAlpha = mul===1?0.85:0.28;
    ctx.beginPath(); ctx.moveTo(x,m.t); ctx.lineTo(x,m.t+ph); ctx.stroke();
    if(mul===1||mul===2||mul===5){ ctx.globalAlpha=1; ctx.textAlign='center'; ctx.fillText(fmtF(f), x, m.t+ph+11); }
  }
  ctx.globalAlpha=1;
  const yt = logy? logTicks(ymin,ymax) : niceTicks(ymin,ymax,5);
  ctx.textAlign='right';
  for(const v of yt){ const y=Y(v); if(y<m.t-1||y>m.t+ph+1) continue;
    ctx.globalAlpha=0.4; ctx.beginPath(); ctx.moveTo(m.l,y); ctx.lineTo(m.l+pw,y); ctx.stroke();
    ctx.globalAlpha=1; ctx.fillText(fmtY(v), m.l-5, y+3); }
  for(const s of plotData.series){
    ctx.strokeStyle=s.color; ctx.lineWidth= s.dash?1.1:1.7;
    if(s.dash) ctx.setLineDash([5,4]); else ctx.setLineDash([]);
    ctx.beginPath(); let started=false;
    for(let i=0;i<s.xs.length;i++){
      const y=Y(s.ys[i]); if(!isFinite(y)) {started=false; continue;}
      const x=X(s.xs[i]);
      if(!started){ctx.moveTo(x,y);started=true;} else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  ctx.setLineDash([]);
  plotData._geo={m,pw,ph,X,Y,f0,f1};
  // synced cursor across all graphs
  if(state.cursorF && plotData.series[0]){
    const s0=plotData.series[0]; let bi=0,bd=1e9;
    for(let i=0;i<s0.xs.length;i++){const dd=Math.abs(Math.log10(s0.xs[i])-Math.log10(state.cursorF)); if(dd<bd){bd=dd;bi=i;}}
    const fx=s0.xs[bi];
    ctx.strokeStyle='#ffffff55'; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(X(fx),m.t); ctx.lineTo(X(fx),m.t+ph); ctx.stroke(); ctx.setLineDash([]);
    let html=`<b>${fx.toFixed(fx<100?1:0)}Hz</b>`;
    for(const s of plotData.series){ if(s.dash) continue; const y=s.ys[bi];
      ctx.fillStyle=s.color; ctx.beginPath(); ctx.arc(X(fx),Y(y),2.6,0,7); ctx.fill();
      html+=` <span style="color:${s.color}">${fmtVal(y,plotData.unit)}</span>`; }
    if(G.read){ G.read.innerHTML=html; G.read.style.display='block'; }
  } else if(G.read){ G.read.style.display='none'; }
}
function drawAll(){ for(const G of GR) drawOne(G); }
function fmtY(v){ const a=Math.abs(v); if(a>=1000) return (v/1000).toFixed(1)+'k'; if(a>=10) return v.toFixed(0); if(a>=1) return v.toFixed(1); return v.toFixed(2); }
function logTicks(min,max){ const t=[]; for(let d=Math.floor(Math.log10(min)); d<=Math.ceil(Math.log10(max)); d++){ for(const mul of [1,2,5]){ const v=mul*Math.pow(10,d); if(v>=min&&v<=max) t.push(v);} } return t; }

function fmtVal(v,u){ if(!isFinite(v))return '—'; const a=Math.abs(v); const d= a>=100?0:a>=10?1:2; return v.toFixed(d)+' '+u; }

/* =========================================================================
   RENDER PLOT for current tab
   ========================================================================= */
// curves for ONE graph + ONE design (pure; series[0] is the primary curve)
function seriesFor(tabId, d){
  const drv=d.driver, box=d.box, P=d.P, sw=designCurves(d);
  const meta=TABS.find(t=>t.id===tabId);
  let series=[], ymin,ymax,logy=false, unit=meta.unit;
  const pick=(arr)=>({xs:sw.fs,ys:arr});
  if(tabId==='SPL'){
    series=[{...pick(sw.spl),color:meta.color,name:'SPL'}];
    const mx=Math.max(...sw.spl); ymax=Math.ceil((mx+3)/5)*5; ymin=ymax-45;
  }else if(tabId==='Excursion'){
    series=[{...pick(sw.exc),color:meta.color,name:'Cone'}];
    const xm=(drv.Xmax*1000);
    series.push({xs:sw.fs,ys:sw.fs.map(_=>xm),color:'#ff6b6b',name:'Xmax',dash:true});
    let top=Math.max(xm*1.4, Math.max(...sw.exc.slice(0,20))*1.1);
    if(box==='pr'){
      series.push({xs:sw.fs,ys:sw.excPR,color:'#5ad17a',name:'PR'});
      const xmp=(P.prXmax||0.01)*1000;
      series.push({xs:sw.fs,ys:sw.fs.map(_=>xmp),color:'#9ad17a',name:'PR Xmax',dash:true});
      top=Math.max(top, xmp*1.3, Math.max(...sw.excPR.slice(0,30))*1.1);
    }
    ymin=0; ymax=top;
  }else if(tabId==='Port'){
    if(box!=='vented'&&box!=='bandpass4'){ series=[{xs:sw.fs,ys:sw.fs.map(_=>0),color:meta.color,name:'n/a'}]; ymin=0;ymax=1; }
    else { series=[{...pick(sw.pv),color:meta.color,name:'Port vel'}];
      series.push({xs:sw.fs,ys:sw.fs.map(_=>0.05*C),color:'#ffb454',name:'17 m/s',dash:true});
      ymin=0; ymax=Math.max(20, Math.max(...sw.pv)*1.1); }
  }else if(tabId==='GD'){
    series=[{...pick(sw.gd),color:meta.color,name:'Group delay'}];
    const mx=Math.max(...sw.gd.filter(isFinite)); ymin=0; ymax=Math.max(mx*1.1,5);
  }else if(tabId==='Zmag'){
    series=[{...pick(sw.zmag),color:meta.color,name:'|Z|'}];
    logy=true; ymin=Math.max(1,Math.min(...sw.zmag)*0.9); ymax=Math.max(...sw.zmag)*1.15;
  }else if(tabId==='Zph'){
    series=[{...pick(sw.zph),color:meta.color,name:'Z phase'}]; ymin=-90; ymax=90;
  }else if(tabId==='Phase'){
    series=[{xs:sw.fs,ys:sw.phase.map(p=>p*180/Math.PI),color:meta.color,name:'Phase'}];
    const ys=series[0].ys; ymin=Math.floor(Math.min(...ys)/90)*90; ymax=Math.ceil(Math.max(...ys)/90)*90;
  }else if(tabId==='MaxSPL'){
    const mc=designMax(d); series=[{xs:mc.fs,ys:mc.maxspl,color:meta.color,name:'Max SPL'}];
    const mx=Math.max(...mc.maxspl); ymax=Math.ceil(mx/5)*5; ymin=ymax-40;
  }else if(tabId==='MaxPwr'){
    const mc=designMax(d); series=[{xs:mc.fs,ys:mc.maxpwr,color:meta.color,name:'Max power'}];
    logy=true; ymin=1; ymax=Math.max(...mc.maxpwr)*1.2;
  }
  return {series,ymin,ymax,logy,unit};
}
// merge current design + pinned comparisons into one graph's plotData
function buildGraph(tabId, cur){
  const designs=[cur, ...state.compare], multi=designs.length>1;
  let out=null;
  designs.forEach((d,di)=>{
    const pd=seriesFor(tabId,d);
    if(!out) out={series:[], ymin:pd.ymin, ymax:pd.ymax, logy:pd.logy, unit:pd.unit};
    const prim={...pd.series[0]};
    if(multi){ prim.color=d.color||DPAL[di%DPAL.length]; prim.name=d.name+': '+prim.name; }
    out.series.push(prim);
    if(di===0) for(let k=1;k<pd.series.length;k++) out.series.push(pd.series[k]); // reference lines from current only
    out.ymin=Math.min(out.ymin,pd.ymin); out.ymax=Math.max(out.ymax,pd.ymax); out.logy=out.logy||pd.logy;
  });
  return out;
}
function driverShort(raw){ return ((raw.name)||[raw.brand,raw.model].filter(Boolean).join(' ')||'Driver').replace(/\.wdr$/i,''); }

function buildGrid(){
  ggrid.innerHTML=''; GR=[];
  const n=state.graphs.length, cols = n<=1?1 : n<=4?2 : 3;
  ggrid.style.gridTemplateColumns='repeat('+cols+',1fr)';
  for(const id of state.graphs){
    const meta=TABS.find(t=>t.id===id)||{name:id};
    const panel=document.createElement('div'); panel.className='gpanel';
    const canvas=document.createElement('canvas');
    const title=document.createElement('div'); title.className='gtitle'; title.textContent=meta.name;
    const read=document.createElement('div'); read.className='gread';
    panel.appendChild(canvas); panel.appendChild(title); panel.appendChild(read);
    ggrid.appendChild(panel);
    const G={id,panel,canvas,ctx:canvas.getContext('2d'),title,read,plotData:null};
    canvas.addEventListener('mousemove',e=>{
      const pd=G.plotData; if(!pd||!pd._geo) return; const g=pd._geo;
      const rect=canvas.getBoundingClientRect(); const frac=(e.clientX-rect.left-g.m.l)/g.pw;
      if(frac<0||frac>1){ if(state.cursorF!==null){state.cursorF=null; drawAll();} return; }
      state.cursorF=Math.pow(10, Math.log10(g.f0)+frac*(Math.log10(g.f1)-Math.log10(g.f0))); drawAll();
    });
    canvas.addEventListener('mouseleave',()=>{ state.cursorF=null; drawAll(); });
    GR.push(G);
  }
}
function buildToolbar(){
  const chips = TABS.map(t=>`<span class="gchip ${state.graphs.includes(t.id)?'on':''}" data-g="${t.id}">${t.name}</span>`).join('');
  const cmp = state.compare.map((d,i)=>`<span class="gchip on" style="border-color:${d.color};color:${d.color}" data-rm="${i}">${d.name} ✕</span>`).join('');
  gtoolbar.innerHTML = `<span class="lab">Graphs:</span>${chips}<span class="sep"></span>`+
    `<button id="pinCmp">+ Compare current</button>`+(state.compare.length?`<span class="lab">vs</span>${cmp}<button id="clrCmp">clear</button>`:'');
  gtoolbar.querySelectorAll('.gchip[data-g]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.g, i=state.graphs.indexOf(id);
    if(i>=0){ if(state.graphs.length>1) state.graphs.splice(i,1); } else state.graphs.push(id);
    render();
  });
  const pin=gtoolbar.querySelector('#pinCmp'); if(pin) pin.onclick=()=>{
    state.compare.push({ driver:deriveDriver(state.driverRaw), box:state.box,
      P:JSON.parse(JSON.stringify(state.P)),
      name:driverShort(state.driverRaw)+' ('+state.box+' '+(state.P.Vb*1000).toFixed(0)+'L)',
      color:DPAL[(state.compare.length+1)%DPAL.length] });
    render();
  };
  const clr=gtoolbar.querySelector('#clrCmp'); if(clr) clr.onclick=()=>{ state.compare=[]; render(); };
  gtoolbar.querySelectorAll('.gchip[data-rm]').forEach(el=>el.onclick=()=>{ state.compare.splice(+el.dataset.rm,1); render(); });
}
function render(){
  recompute();
  if(state.box==='vented'||state.box==='bandpass4'){ state.P.Sp=Math.PI*(state.P.ventD/2)**2; state.P.Leff=state.P.ventL+0.85*state.P.ventD; }
  const cur={driver:state.driver, box:state.box, P:state.P, name:driverShort(state.driverRaw), color:DPAL[0]};
  if(GR.length!==state.graphs.length || GR.some((G,i)=>G.id!==state.graphs[i])) buildGrid();
  for(const G of GR) G.plotData=buildGraph(G.id, cur);
  drawAll();
  renderStat(designCurves(cur), cur.driver, cur.box, cur.P);
  buildToolbar();
  saveLocal();
}
function renderStat(sw,drv,box,P){
  const f3 = findF3(sw.fs,sw.spl);
  const peakZ = Math.max(...sw.zmag);
  const fb = (box==='vented')? tuningFromLength(P.Vb,P.ventL,P.Sp) : null;
  const fp = (box==='pr')? prTuning(P) : null;
  const Qtc = (box==='sealed')? drv.Qts*Math.sqrt(1+drv.Vas/P.Vb):null;
  const fc  = (box==='sealed')? drv.Fs*Math.sqrt(1+drv.Vas/P.Vb):null;
  const maxPV = (box==='vented'||box==='bandpass4')?Math.max(...sw.pv):null;
  const maxPRx= (box==='pr')?Math.max(...sw.excPR):null;
  let s=[];
  s.push(`Box: <b>${box}</b>`);
  s.push(`Vb: <b>${(P.Vb*1000).toFixed(1)} L</b>`);
  if(fc) s.push(`fc: <b>${fc.toFixed(1)} Hz</b>`);
  if(Qtc) s.push(`Qtc: <b>${Qtc.toFixed(3)}</b>`);
  if(fb) s.push(`Fb: <b>${fb.toFixed(1)} Hz</b>`);
  if(fp) s.push(`Fp: <b>${fp.toFixed(1)} Hz</b>`);
  s.push(`F3: <b>${f3?f3.toFixed(1)+' Hz':'—'}</b>`);
  s.push(`Z peak: <b>${peakZ.toFixed(1)} Ω</b>`);
  if(maxPV!=null) s.push(`peak port: <b>${maxPV.toFixed(1)} m/s</b>`);
  if(maxPRx!=null) s.push(`peak PR: <b>${maxPRx.toFixed(1)} mm</b> (Xmax ${(P.prXmax*1000).toFixed(1)})`);
  s.push(`EBP: <b>${ebp(drv).toFixed(0)}</b>`);
  document.getElementById('stat').innerHTML=s.join(' &nbsp;·&nbsp; ');
}
function findF3(fs,spl){
  // passband ref = max in upper region
  const ref=Math.max(...spl);
  for(let i=0;i<fs.length;i++){ if(spl[i]>=ref-3) return fs[i]; }
  return null;
}

function download(name, text, mime){
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([text],{type:mime||'text/plain'}));
  a.download=name; a.click();

// ---- complete app state: driver + box + params + which graphs + comparisons ----
function serializeState(){
  return { v:1, driver:state.driverRaw, box:state.box, P:state.P, graphs:state.graphs,
    compare: state.compare.map(d=>({driver:d.driver, box:d.box, P:d.P, name:d.name, color:d.color})) };
}
function applyState(o){
  if(!o) return false;
  if(o.driver) state.driverRaw=o.driver;
  if(o.box) state.box=o.box;
  if(o.P) state.P=Object.assign(state.P, o.P);
  if(Array.isArray(o.graphs)&&o.graphs.length) state.graphs=o.graphs;
  if(Array.isArray(o.compare)) state.compare=o.compare.map(c=>({driver:c.driver, box:c.box, P:c.P, name:c.name, color:c.color}));
  return true;
}

const b64urlDec=s=>decodeURIComponent(escape(atob(s.replace(/-/g,'+').replace(/_/g,'/'))));

/* =========================================================================
   FEDERATED DRIVER BROWSER
   Reads drivers/sources.json (a list of external driver repos) and lets you
   pull a .wdr from any of them — or any GitHub repo you paste — on demand.
   We link, never re-host. GitHub's API + raw content allow cross-origin reads.
   ========================================================================= */
// Fallback list bundled in case sources.json can't be fetched (offline / file://)
const DEFAULT_SOURCES = [
  {name:'Resonate built-in', type:'github', repo:'Johnlon/resonate', branch:'main', path:'drivers', fileExtension:'.wdr', url:'https://github.com/Johnlon/resonate/tree/main/drivers'},
  {name:'MWisBest / WinISDDrivers', type:'github', repo:'MWisBest/WinISDDrivers', branch:'master', path:'', fileExtension:'.wdr', url:'https://github.com/MWisBest/WinISDDrivers'},
];
const browse = { sources:[], files:[], source:null };

async function loadSources(){
  // Try the live registry first so the list stays current; fall back to bundled.
  try{
    const r=await fetch('drivers/sources.json',{cache:'no-store'});
    if(r.ok){ const j=await r.json(); if(j&&Array.isArray(j.sources)&&j.sources.length) return j.sources; }
  }catch(e){/* offline or file:// — use defaults */}
  return DEFAULT_SOURCES;
}
function parseRepoInput(s){
  s=s.trim(); if(!s) return null;
  let m=s.match(/github\.com\/([^/]+)\/([^/]+?)(?:\.git)?(?:\/tree\/([^/]+)(?:\/(.*))?)?$/i);
  if(m) return {name:m[1]+'/'+m[2], type:'github', repo:m[1]+'/'+m[2], branch:m[3]||'', path:m[4]||'', fileExtension:'.wdr', url:'https://github.com/'+m[1]+'/'+m[2]};
  m=s.match(/^([\w.-]+)\/([\w.-]+)$/);            // owner/repo shorthand
  if(m) return {name:s, type:'github', repo:s, branch:'', path:'', fileExtension:'.wdr', url:'https://github.com/'+s};
  return null;
}
async function ghDefaultBranch(repo){
  const r=await fetch(`https://api.github.com/repos/${repo}`);
  if(!r.ok) throw new Error('repo not found ('+r.status+')');
  return (await r.json()).default_branch||'main';
}
async function listFiles(src){
  const branch = src.branch || await ghDefaultBranch(src.repo);
  const r=await fetch(`https://api.github.com/repos/${src.repo}/git/trees/${branch}?recursive=1`);
  if(!r.ok) throw new Error('cannot list files ('+r.status+(r.status===403?', GitHub rate limit — try later':'')+')');
  const tree=(await r.json()).tree||[];
  const ext=(src.fileExtension||'.wdr').toLowerCase();
  const base=(src.path||'').replace(/^\/|\/$/g,'');
  return tree.filter(t=>t.type==='blob' && t.path.toLowerCase().endsWith(ext)
                       && (!base || t.path.toLowerCase().startsWith(base.toLowerCase()+'/')))
             .map(t=>({path:t.path, branch, repo:src.repo,
                       name:t.path.split('/').pop().replace(/\.wdr$/i,'')}));
}
function rawUrl(f){ return `https://raw.githubusercontent.com/${f.repo}/${f.branch}/${f.path.split('/').map(encodeURIComponent).join('/')}`; }

function renderFileList(){
  const q=$('srcFilter').value.toLowerCase();

  • output:  p = ρω·U0/(2πr), half-space @ 1 m

VALIDATED (run: node test/engine.test.mjs):
  • sealed circuit ≡ closed form fc=Fs√(1+Vas/Vb), Qtc=Qts√(1+Vas/Vb)  (<0.03 dB)
  • passband asymptotes to driver reference sensitivity
  • vented: 24 dB/oct rolloff + twin impedance peaks straddling Fb

Box types: sealed, vented, 4th-order bandpass, passive radiator
  (PR: own excursion curve + Xmax, Fp tuning readout, mass auto-tune).
Curves: SPL, driver+PR excursion, air velocity, group delay,
        impedance |Z| & phase, transfer phase, max SPL, max power.

FILES:
  • Import / Export WinISD .wdr driver files (INI text, SI units). Imported
    drivers are made internally self-consistent; core T/S round-trips exactly.
  • Browse drivers: load .wdr files on demand from federated GitHub repos
    listed in drivers/sources.json, or any repo you paste.
  • Save/load whole projects as JSON.
  • .wpr WinISD projects: plain INI text in current WinISD — import is feasible
    and on the roadmap; for now, save/load as JSON.

Not yet ported from WinISD: 6th-order bandpass, iso-baric, full filter/EQ
chain (Linkwitz transform, parametric EQ), diffraction/baffle step.`);
};

/* =========================================================================
   SELF-TEST  — reruns the validation gates against the shipped JS engine.
   Logged to console at boot so the engine can be verified in-browser.
   ========================================================================= */
function selfTest(){
  const raw={Fs:37,Qts:0.38,Qes:0.40,Qms:7.0,Vas:0.030,Sd:0.0133,Re:5.6,Le:0.7e-3,Xmax:0.005,Pe:60,Z:8};
  const d=deriveDriver(raw), Vb=0.020;
  // GATE 1: sealed shape vs closed form (lossless, Le=0)
  const di=Object.assign({},d,{Le:0});
  const fc=d.Fs*Math.sqrt(1+d.Vas/Vb), Qtc=d.Qts*Math.sqrt(1+d.Vas/Vb);
  const Psl={Vb,Ql:1e6,nDrivers:1,wiring:'parallel',eg:2.83,fmin:10,fmax:1000,N:300};
  const sw=sweep(di,'sealed',Psl);
  const ref=sw.spl[sw.spl.length-1]; let e1=0;
  for(let i=0;i<sw.fs.length;i++){ const x=sw.fs[i]/fc; const g2=(x**4)/((1-x*x)**2+(x*x)/(Qtc*Qtc));
    e1=Math.max(e1,Math.abs(sw.spl[i]-(ref+10*Math.log10(g2)))); }
  // GATE 2: passband sensitivity
  const eta0=(4*Math.PI**2/C**3)*(d.Fs**3*d.Vas)/d.Qes;
  const sens283=112.1+10*Math.log10(eta0)+10*Math.log10(2.83**2/d.Re);
  const i300=sw.fs.findIndex(f=>f>=300); const pb=sw.spl[i300];
  // GATE 3: vented slope + impedance peaks
  const Cab=Vb/(RHO*C*C), fb=30, wb=2*Math.PI*fb, Map=1/(wb*wb*Cab), Sp=Math.PI*0.025**2;
  const Pv=Object.assign({},Psl,{Ql:7,Sp,Leff:Map*Sp/RHO});
  const sv=sweep(d,'vented',Pv);
  const a=sv.fs.findIndex(f=>f>=12), b=sv.fs.findIndex(f=>f>=15);
  const slope=(sv.spl[b]-sv.spl[a])/Math.log2(sv.fs[b]/sv.fs[a]);
  const peaks=[]; for(let i=1;i<sv.zmag.length-1;i++) if(sv.zmag[i]>sv.zmag[i-1]&&sv.zmag[i]>sv.zmag[i+1]&&sv.zmag[i]>d.Re*1.5) peaks.push(+sv.fs[i].toFixed(1));
  const p1=e1<0.1, p2=Math.abs(pb-sens283)<0.5, p3=Math.abs(slope-24)<3&&peaks.length===2;
  console.log('%c[Resonate self-test]','font-weight:bold',
    `\n GATE1 sealed≡closed-form: max err ${e1.toFixed(4)} dB  -> ${p1?'PASS':'FAIL'}`,
    `\n GATE2 sensitivity: circuit ${pb.toFixed(2)} dB vs predicted ${sens283.toFixed(2)} dB (Δ${(pb-sens283).toFixed(2)}) -> ${p2?'PASS':'FAIL'}`,
    `\n GATE3 vented slope ${slope.toFixed(1)} dB/oct, Z-peaks ${JSON.stringify(peaks)} -> ${p3?'PASS':'FAIL'}`,
    `\n OVERALL: ${p1&&p2&&p3?'%cALL PASS':'%cFAIL'}`,'font-weight:bold;color:'+(p1&&p2&&p3?'green':'red'));
  return {p1,p2,p3};
}

/* =========================================================================
   BOOT
   ========================================================================= */
function init(){ if(!loadStateFromUrl()) loadLocal(); recompute(); buildSide(); render(); selfTest(); }
window.addEventListener('hashchange', ()=>{ if(loadStateFromUrl()){ buildSide(); render(); } });
window.addEventListener('resize', drawAll);
init();
</script>
